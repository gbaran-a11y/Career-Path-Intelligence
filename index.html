<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=ultra-simple.html">
  <title>Career Intelligence Platform - Redirecting...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0e2a52 0%, #0b1f3f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    .logo {
      font-size: 64px;
      margin-bottom: 24px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #00d4e5;
      text-shadow: 0 0 20px rgba(0, 212, 229, 0.5);
    }

    p {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 32px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(0, 212, 229, 0.2);
      border-top-color: #00d4e5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .manual-link {
      margin-top: 32px;
    }

    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #00d4e5;
      color: #0b1f3f;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s;
      box-shadow: 0 0 20px rgba(0, 212, 229, 0.4);
    }

    .btn:hover {
      background: #2de2f0;
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0, 212, 229, 0.6);
    }

    .features {
      margin-top: 48px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .feature {
      background: rgba(0, 212, 229, 0.1);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(0, 212, 229, 0.3);
    }

    .feature-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .feature-title {
      font-size: 14px;
      font-weight: 600;
      color: #00d4e5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎯</div>
    <h1>Career Intelligence Platform</h1>
    <p>Redirecting to application...</p>

    <div class="spinner"></div>

    <div class="manual-link">
      <p style="font-size: 14px; margin-bottom: 16px;">If you're not redirected automatically:</p>
      <a href="ultra-simple.html" class="btn">Launch Application</a>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🔍</div>
        <div class="feature-title">JD Analyzer</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🗺️</div>
        <div class="feature-title">Career Paths</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🧠</div>
        <div class="feature-title">Gap Analysis</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🏢</div>
        <div class="feature-title">Departments</div>
      </div>
    </div>
  </div>

  <script>
    // Backup JavaScript redirect in case meta refresh doesn't work
    setTimeout(() => {
      window.location.href = 'ultra-simple.html';
    }, 100);
  </script>
</body>
</html>
