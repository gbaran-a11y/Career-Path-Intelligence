<!DOCTYPE html>
<html>
<head>
  <title>Button Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .btn { padding: 10px 20px; background: #3B82F6; color: white; border: none; border-radius: 6px; cursor: pointer; }
    textarea { width: 100%; min-height: 100px; margin: 10px 0; padding: 10px; }
  </style>
</head>
<body>
  <h1>Button Test</h1>
  <p>Type something and click the button:</p>

  <textarea id="testInput" placeholder="Type here...">Test text</textarea>

  <button class="btn" onclick="testButton()">Test Button</button>

  <div id="output" style="margin-top: 20px; padding: 10px; background: #f0f0f0;"></div>

  <script>
    function testButton() {
      const text = document.getElementById('testInput').value;
      document.getElementById('output').innerHTML = 'Button clicked! Text: ' + text;
      console.log('Button working! Text:', text);
      alert('Button is working! You entered: ' + text);
    }

    // Test on page load
    window.onload = function() {
      console.log('Page loaded');
      document.getElementById('output').innerHTML = 'Page loaded. Button should work.';
    };
  </script>
</body>
</html>
